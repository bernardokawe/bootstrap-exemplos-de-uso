<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Promoções da Loja</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .carousel-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Minha Loja</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Início</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Ofertas</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contato</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- ALERTA -->
<div class="container mt-3">
  <div class="alert alert-success alert-dismissible fade show" role="alert">
    Promoção ativa! Ganhe até 50% de desconto!
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
</div>

<!-- CARROSSEL -->
<div class="container mt-4 d-flex justify-content-center">
  <div id="carouselExample" class="carousel slide w-75">

    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="https://picsum.photos/800/300?1" class="d-block w-100">
      </div>
      <div class="carousel-item">
        <img src="https://picsum.photos/800/300?2" class="d-block w-100">
      </div>
      <div class="carousel-item">
        <img src="https://picsum.photos/800/300?3" class="d-block w-100">
      </div>
    </div>

    <!-- Controles -->
    <button class="carousel-control-prev" data-bs-target="#carouselExample" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" data-bs-target="#carouselExample" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>
</div>

<!-- PROGRESSO -->
<div class="container mt-5 text-center">
  <h4>Desbloqueie seu desconto</h4>

  <div class="progress mt-3" style="height: 25px;">
    <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%">
      0%
    </div>
  </div>

  <button id="increase-progress" class="btn btn-primary mt-3">
    Ganhar Desconto
  </button>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- SCRIPT -->
<script>
document.getElementById('increase-progress').addEventListener('click', function() {
    let progressBar = document.getElementById('progress-bar');
    let width = parseInt(progressBar.style.width) || 0;

    if (width < 100) {
        width += 20;
        progressBar.style.width = width + "%";
        progressBar.textContent = width + "%";

        if (width === 100) {
            alert("Parabéns! Você desbloqueou um desconto especial!");
        }
    }
});
</script>

</body>
</html>
